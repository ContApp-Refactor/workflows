name: "Build Docker image & push to Docker Hub on push to develop branch"
on:
  workflow_call:
    inputs:
      repository-name: 
        description: "El nombre del repositorio"
        required: true
        type: string
jobs:


  build-n-deploy:
    name: Build Docker image, push to Docker Hub and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      REPO_NAME: ${{ inputs.repository-name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PAT }}


      - name: Semantic versioning
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          bump_each_commit: true
          branch: develop
          tag_prefix: "v"
          debug: true
      - name: Save version number as environment variable
        run: echo "VERSION=${{ steps.semver.outputs.version_tag }}" >> $GITHUB_ENV


      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USER }}/${{ env.REPO_NAME }}:${{ env.VERSION }}



      - name: Update docker-compose.yaml with new image version with yq
        run: |
          yq -i '.services["${{ env.REPO_NAME }}"].image = "${{ secrets.DOCKERHUB_USER }}/${{ env.REPO_NAME }}:${{ env.VERSION }}"' docker-compose.yaml


      - name: Commit and push updated docker-compose.yaml
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update docker-compose.yaml with new image version ${{ env.VERSION }} [skip ci]"
          branch: develop
          file_pattern: docker-compose.yaml


      - name: Connect to Fortinet VPN
        run: |
          sudo apt-get -q update
          sudo apt-get -q install -y openconnect
          printf '%s' '${{ secrets.VPN_PASS }}' | \
            sudo openconnect \
              --background \
              --protocol=fortinet \
              -u '${{ secrets.VPN_USER }}' \
              --passwd-on-stdin \
              '${{ secrets.VPN_ENDP }}' \
              >/dev/null

      - name: Create application directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p /opt/${{ env.REPO_NAME }}

      - name: Copy docker-compose.yaml
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: docker-compose.yaml
          target: /opt/${{ env.REPO_NAME }}

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/${{ env.REPO_NAME }}
            docker compose up -d --pull always --wait --wait-timeout 60



      - name: Disconnect from Fortinet VPN
        if: always()
        run: sudo pkill -SIGINT openconnect || true